name: Bump EnviousWispr cask

# Reconciles Casks/enviouswispr.rb to the latest published EnviousWispr release
# (version + sha256), then commits if anything changed.
#
# Why this lives HERE (the tap), not in the EnviousWispr release pipeline:
# the release pipeline runs in the EnviousWispr repo, and its built-in token
# cannot write to THIS separate repo. Running the bump here lets it use this
# repo's own built-in token (no cross-repo personal token to mint or guard).
#
# How it runs: triggered as the final step of cutting a release (via
# `gh workflow run bump-cask.yml -R saurabhav88/homebrew-tap`, or the
# "Run workflow" button). It always recomputes the checksum from the actual
# DMG and reconciles the cask, so it self-heals a wrong/stale sha even when the
# version already matches, and is a clean no-op (no commit) when already correct.

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: bump-cask
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      UPSTREAM: saurabhav88/EnviousWispr
      CASK: Casks/enviouswispr.rb
    steps:
      - name: Checkout tap
        uses: actions/checkout@v5

      - name: Resolve latest release
        id: rel
        run: |
          set -euo pipefail
          # tag_name comes straight from the GitHub API (not from a workflow expression).
          TAG="$(gh api "repos/${UPSTREAM}/releases/latest" --jq '.tag_name')"
          # Whole tag must be exactly vX.Y.Z — anchored at both ends so untrusted
          # release metadata can never carry extra shell-meaningful characters.
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::unexpected release tag '$TAG' (want vX.Y.Z)"; exit 1
          fi
          echo "tag=$TAG"            >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}"    >> "$GITHUB_OUTPUT"
          echo "Latest EnviousWispr release: $TAG"

      - name: Download DMG and compute sha256
        id: dmg
        env:
          TAG: ${{ steps.rel.outputs.tag }}
          VERSION: ${{ steps.rel.outputs.version }}
        run: |
          set -euo pipefail
          URL="https://github.com/${UPSTREAM}/releases/download/${TAG}/EnviousWispr-${VERSION}.dmg"
          echo "Downloading $URL"
          curl -fsSL --retry 3 -o /tmp/EnviousWispr.dmg "$URL"
          SHA="$(sha256sum /tmp/EnviousWispr.dmg | awk '{print $1}')"
          if [[ ! "$SHA" =~ ^[0-9a-f]{64}$ ]]; then
            echo "::error::computed sha256 looks wrong: '$SHA'"; exit 1
          fi
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "sha256: $SHA"

      - name: Reconcile cask to release version + sha256
        env:
          VERSION: ${{ steps.rel.outputs.version }}
          SHA: ${{ steps.dmg.outputs.sha256 }}
        run: |
          set -euo pipefail
          # Values are passed as argv (not interpolated into the script body) so
          # release metadata never reaches the shell/Python parser directly.
          python3 - "$CASK" "$VERSION" "$SHA" <<'PY'
          import re, sys
          path, version, sha = sys.argv[1], sys.argv[2], sys.argv[3]
          src = open(path).read()
          # Require exactly one version line and exactly one quoted 64-hex sha256
          # line — guards against a drifted cask shape (duplicate lines, or
          # sha256 :no_check which would match zero times).
          vlines = re.findall(r'^\s*version "[^"]*"', src, re.M)
          slines = re.findall(r'^\s*sha256 "[0-9a-f]{64}"', src, re.M)
          if len(vlines) != 1 or len(slines) != 1:
              sys.exit("cask shape unexpected: version lines=%d, quoted-sha256 lines=%d (want 1 each)"
                       % (len(vlines), len(slines)))
          src, nv = re.subn(r'^(\s*version )"[^"]*"', r'\g<1>"%s"' % version, src, count=1, flags=re.M)
          src, ns = re.subn(r'^(\s*sha256 )"[0-9a-f]{64}"', r'\g<1>"%s"' % sha, src, count=1, flags=re.M)
          assert nv == 1 and ns == 1
          open(path, 'w').write(src)
          print("cask reconciled to version %s sha256 %s" % (version, sha))
          PY
          grep -qF "version \"$VERSION\"" "$CASK"
          grep -qF "sha256 \"$SHA\"" "$CASK"

      - name: Commit and push if changed
        env:
          VERSION: ${{ steps.rel.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$CASK"
          if git diff --cached --quiet; then
            echo "Cask already correct for $VERSION — no commit needed."; exit 0
          fi
          git commit -m "chore: bump enviouswispr to $VERSION"
          git push
          echo "Pushed reconcile to $VERSION."
